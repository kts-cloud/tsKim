; =============================================================
; ECS Status Grid Configuration
; InlineGIB=1, OCType=OC (current deployment)
;
; Matches Delphi ECSStatusForm.Init_Grid + UpdateStatus mapping.
; Modify this file to change the ECS Status page Polling Grid layout.
;
; Format:
;   [Column_NN] — column definition (NN = 01..ColumnCount, zero-padded)
;   Label       — column header text
;   Group       — EQP, Robot, or ECS (determines header/cell color)
;   Division    — PLC data source: 0=PollingEqp, 1=PollingData(Robot), 2=PollingEcs
;   Index       — Array index within the polling data source
;   BitNN       — Label for bit NN (00-15). Empty/omitted = undefined bit.
;   BitNN_Src   — Override data source: Division,Index[,BitLoc]
;                  If omitted, uses column's Division+Index, BitLoc=NN.
; =============================================================

[Grid]
ColumnCount=23

; ═══════════════════════════════════════════════════════════════
; EQP Columns (Division=0, PollingEqp[])
; ═══════════════════════════════════════════════════════════════

[Column_01]
Label=EQP Status
Group=EQP
Division=0
Index=0
Bit00=ECS Restart ACK
Bit01=Link Test Restart ACK
Bit02=Control Status Change Report
Bit03=EQP Status Change Report
Bit12=Light Alarm Set
Bit13=Light Alarm Reset
Bit14=Heavy Alarm Set
Bit15=Heavy Alarm Reset

[Column_02]
Label=EQP Special
Group=EQP
Division=0
Index=1
Bit00=Lost Glass Data Request
; Bits 1-3: Door Open signals — read from PollingEqp[7] bits 0-2
Bit01=Door Open Warning
Bit01_Src=0,7,0
Bit02=Door Open Warning Confirm
Bit02_Src=0,7,1
Bit03=Door Open Info
Bit03_Src=0,7,2
Bit06=Take Out Report
Bit08=CH 1 Skip
Bit09=CH 2 Skip
Bit10=CH 3 Skip
Bit11=CH 4 Skip

